<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Site Pro - Elisée</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f4f4f9;
            margin-top: 50px;
        }
        button {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            border-radius: 10px;
            cursor: pointer;
            margin: 10px;
            transition: 0.3s;
            width: 250px;
        }
        button:hover {
            background-color: #0056b3;
        }
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
    .profile-pic {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #007bff;
            margin-bottom: 15px;
        }

        .service-form {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin: 20px 0;
            width: 100%;
            max-width: 300px;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="ma-photo.jpg" alt="Photo de profil d'Elisée" class="profile-pic">
        <h2>Demande de Service</h2>
        <form action="#" method="POST" class="service-form">
            <input type="text" name="nom" placeholder="Votre Nom" required>
            <input type="email" name="email" placeholder="Votre Email" required>
            <select name="service">
                <option value="creation-web">Création de Site Web</option>
                <option value="python">Programme Python</option>
                <option value="autre">Autre demande</option>
            </select>
            <textarea name="message" placeholder="Détails de votre projet..." rows="4"></textarea>
            <button type="submit" class="btn">Envoyer la demande</button>
        </form>
     
    <h1>Bienvenue sur mon site !</h1>
    <p>Je suis développeur et voici mes liens professionnels :</p>

        <a href="https://github.com/elisee-code" target="_blank">
            <button>Mon LinkedIn</button>
        </a>

        <a href="https://github.com/elisee-code" target="_blank">
            <button>Mon GitHub</button>
        </a>
    </div>
